name: Release macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow manual triggering for testing

jobs:
  build:
    runs-on: xcode-27

    permissions:
      contents: write # needed for creating a release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Local Packages
        run: |
          # The local package SwiftMath is not included directly or in submodules
          mkdir -p Packages
          rm -rf Packages/SwiftMath # Remove empty submodule reference if any
          git clone --depth 1 --branch 1.7.3 https://github.com/mgriebling/SwiftMath.git Packages/SwiftMath

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project Cauchy.xcodeproj \
            -scheme Cauchy \
            -configuration Release \
            -archivePath $PWD/build/Cauchy.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          # Copy the .app into a fresh folder to prepare the DMG
          mkdir -p dmg_source
          cp -R build/Cauchy.xcarchive/Products/Applications/Cauchy.app dmg_source/
          
          # Create the DMG (using the modern diskutil command for macOS 27+)
          rm -f Cauchy.dmg
          diskutil image create from dmg_source --volumeName "Cauchy" --format UDZO Cauchy.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Cauchy.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
